<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Board -->
  <rect x="16" y="16" width="224" height="224" rx="10" fill="#222831" stroke="#3C4655" stroke-width="2"/>

  <!-- Route 1: top-left → top-right -->
  <polyline points="30,50 100,50 130,80 160,80 190,110 220,110"
    fill="none" stroke="#2980FF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Route 2: middle-left → bottom-right -->
  <polyline points="30,130 70,130 100,160 150,160 180,190 220,190"
    fill="none" stroke="#489CFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Route 3: bottom-left → middle-right -->
  <polyline points="30,210 80,210 110,180 140,180 170,150 220,150"
    fill="none" stroke="#1E64DC" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Route 4: vertical center -->
  <polyline points="160,40 160,70 190,100 190,130 160,160 160,200"
    fill="none" stroke="#64B4FF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Route 5: short cross -->
  <polyline points="60,80 100,80 120,100 140,100 160,120"
    fill="none" stroke="#2980FF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Vias (grey ring + fill) -->
  <g>
    <circle cx="100" cy="50" r="6" fill="#787882"/><circle cx="100" cy="50" r="4.5" fill="#A0A0AA"/>
    <circle cx="130" cy="80" r="6" fill="#787882"/><circle cx="130" cy="80" r="4.5" fill="#A0A0AA"/>
    <circle cx="190" cy="110" r="6" fill="#787882"/><circle cx="190" cy="110" r="4.5" fill="#A0A0AA"/>
    <circle cx="70" cy="130" r="6" fill="#787882"/><circle cx="70" cy="130" r="4.5" fill="#A0A0AA"/>
    <circle cx="100" cy="160" r="6" fill="#787882"/><circle cx="100" cy="160" r="4.5" fill="#A0A0AA"/>
    <circle cx="180" cy="190" r="6" fill="#787882"/><circle cx="180" cy="190" r="4.5" fill="#A0A0AA"/>
    <circle cx="80" cy="210" r="6" fill="#787882"/><circle cx="80" cy="210" r="4.5" fill="#A0A0AA"/>
    <circle cx="110" cy="180" r="6" fill="#787882"/><circle cx="110" cy="180" r="4.5" fill="#A0A0AA"/>
    <circle cx="170" cy="150" r="6" fill="#787882"/><circle cx="170" cy="150" r="4.5" fill="#A0A0AA"/>
    <circle cx="160" cy="70" r="6" fill="#787882"/><circle cx="160" cy="70" r="4.5" fill="#A0A0AA"/>
    <circle cx="190" cy="100" r="6" fill="#787882"/><circle cx="190" cy="100" r="4.5" fill="#A0A0AA"/>
    <circle cx="190" cy="130" r="6" fill="#787882"/><circle cx="190" cy="130" r="4.5" fill="#A0A0AA"/>
    <circle cx="160" cy="160" r="6" fill="#787882"/><circle cx="160" cy="160" r="4.5" fill="#A0A0AA"/>
    <circle cx="120" cy="100" r="6" fill="#787882"/><circle cx="120" cy="100" r="4.5" fill="#A0A0AA"/>
    <circle cx="160" cy="120" r="6" fill="#787882"/><circle cx="160" cy="120" r="4.5" fill="#A0A0AA"/>
  </g>
</svg>
