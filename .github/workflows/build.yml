name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.0.22)'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: windows
            make-target: ci-windows
            artifact-suffix: windows-x64.exe
          - name: macos-x64
            os: macos-13
            target: macos
            make-target: macos
            artifact-suffix: macos-x64
          - name: macos-arm64
            os: macos-14
            target: macos-arm
            make-target: macos-arm
            artifact-suffix: macos-arm64
          - name: linux-x64
            os: ubuntu-22.04
            target: linux
            make-target: linux
            artifact-suffix: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend toolchain
        working-directory: frontend
        run: npx tsc --version

      - name: Install Python dependencies
        run: pip install pillow

      - name: Set up MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Install go-winres (Windows)
        if: runner.os == 'Windows'
        run: go install github.com/tc-hib/go-winres@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Set version
        shell: bash
        run: echo "${{ github.event.inputs.version }}" > VERSION

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "windows" ]]; then
            export PATH="/c/msys64/mingw64/bin:$PATH"
            export CC=gcc
          fi
          make ${{ matrix.make-target }}

      - name: Set artifact name
        shell: bash
        run: |
          VERSION=$(cat VERSION | tr -d '\n\r ')
          echo "ARTIFACT_NAME=freerouting-desktop-${VERSION}-${{ matrix.artifact-suffix }}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: build/${{ env.ARTIFACT_NAME }}
          if-no-files-found: error
