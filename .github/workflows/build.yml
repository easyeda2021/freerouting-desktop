name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: windows
            make-target: ci-windows
          - name: macos-x64
            os: macos-13
            target: macos
            make-target: macos
          - name: macos-arm64
            os: macos-14
            target: macos-arm
            make-target: macos-arm
          - name: linux-x64
            os: ubuntu-22.04
            target: linux
            make-target: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend toolchain
        working-directory: frontend
        run: npx tsc --version

      - name: Install Python dependencies
        run: pip install pillow

      - name: Set up MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Install go-winres (Windows)
        if: runner.os == 'Windows'
        run: go install github.com/tc-hib/go-winres@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Set version
        shell: bash
        run: |
          BASE=$(cat VERSION | tr -d '\n\r ')
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "${GITHUB_REF#refs/tags/}" > VERSION
          else
            echo "${BASE}-${GITHUB_SHA::7}" > VERSION
          fi

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "windows" ]]; then
            export PATH="/c/msys64/mingw64/bin:$PATH"
            export CC=gcc
          fi
          make ${{ matrix.make-target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: build/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true
